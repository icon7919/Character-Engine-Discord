name: .NET 10 Build and Test

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive # Important since the repo uses submodules

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore "src/CharacterEngineDiscord.slnx"

    - name: Build Solution
      run: dotnet build "src/CharacterEngineDiscord.slnx" --no-restore

    - name: Run Tests
      run: dotnet test "src/CharacterEngineDiscord.slnx" --no-build --verbosity normal

    # --- NEW: Upload the built Discord Bot files ---
    - name: Upload Discord Bot Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CharacterEngine-DiscordBot
        path: src/CharacterEngine.DiscordBot/bin/Debug/net10.0/
        if-no-files-found: error

    # --- NEW: Upload the built Server backend files ---
    - name: Upload Backend Server Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CharacterEngine-Server
        path: src/CharacterEngine.Server/bin/Debug/net10.0/
        if-no-files-found: error
