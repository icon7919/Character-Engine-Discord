name: .NET 10 Build and Test

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive # Important since the repo uses submodules

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore "src/CharacterEngineDiscord.slnx"

    - name: Build Solution
      run: dotnet build "src/CharacterEngineDiscord.slnx" --no-restore --configuration Release

    - name: Run Tests
      run: dotnet test "src/CharacterEngineDiscord.slnx" --no-build --verbosity normal
